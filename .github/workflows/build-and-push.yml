name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./allotment/Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: leepaulalexander/allotment:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}

  notify-success:
    needs: build
    if: success()
    uses: leealexander/.github/.github/workflows/telegram-notify.yml@main
    with:
      status: success
      message: "Build succeeded — leealexander/allotment"
    secrets: inherit

  notify-failure:
    needs: build
    if: failure()
    uses: leealexander/.github/.github/workflows/telegram-notify.yml@main
    with:
      status: failure
      message: "Build failed — leealexander/allotment"
    secrets: inherit
