name: GitHub Event Notifications

on:
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          if [ "$EVENT" = "issues" ]; then
            echo "message=Issue ${ACTION}: #${{ github.event.issue.number }} ${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "issue_comment" ]; then
            echo "message=New comment on issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "pull_request" ]; then
            echo "message=PR ${ACTION}: #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "pull_request_review" ]; then
            echo "message=PR review (${{ github.event.review.state }}): #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram message
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📌 *${{ steps.msg.outputs.message }}*
            Repo: [${{ github.repository }}](https://github.com/${{ github.repository }})
            [View](https://github.com/${{ github.event.issue.html_url || github.event.pull_request.html_url || github.repository }})
